# Runs the Jest suite with coverage. On pushes to main it also publishes a
# shields.io endpoint JSON with the line-coverage percentage to the orphan
# `badges` branch, which the README coverage badge reads — no external
# coverage service or secrets required.

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Needed only to force-push the badges branch on main.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - run: npm ci --no-audit --no-fund --loglevel=error

      - run: npm test -- --coverage --coverageReporters=json-summary --coverageReporters=text

      # Force-pushes a single-file orphan branch each run, so the branch
      # never accumulates history.
      - name: Publish coverage badge data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pct=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
          color=$(node -p "const p=$pct; p>=90?'brightgreen':p>=80?'green':p>=70?'yellowgreen':p>=60?'yellow':'red'")
          mkdir badge && cd badge
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > coverage.json
          git init -q -b badges
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage.json
          git commit -qm "coverage badge: ${pct}% lines"
          git push -qf "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
